<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🌾 BH Krishi Samachar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gd:#1a5c2e;--gm:#2d8a4e;--gl:#4caf72;--gp:#e8f5ee;--gu:#f2faf5;
  --gold:#c9952a;--gold-l:#fdf3e0;
  --red:#c0392b;--red-l:#fdf0ee;
  --blue:#1a5f8a;--blue-l:#eaf4fb;
  --amb:#d97706;--amb-l:#fffbeb;
  --td:#1a1f1c;--tm:#3d4940;--tmut:#6b7a70;
  --bdr:#d4e6da;--bg:#f5f9f6;--wh:#ffffff;
  --fd:'Playfair Display',Georgia,serif;
  --fb:'DM Sans',sans-serif;
  --r:12px;--rs:8px;
}
body{font-family:var(--fb);background:var(--bg);color:var(--td);min-height:100vh;font-size:15px;}

/* TOPBAR */
.topbar{background:var(--gd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:9999;}
.tb-logo{font-family:var(--fd);font-size:18px;color:#fff;}
.tb-logo span{color:var(--gold);}
.tb-badge{background:var(--gold);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:6px;}
.live-dot{width:8px;height:8px;background:#4caf50;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* LANG BAR */
.lang-bar-wrap{background:#163d24;border-bottom:2px solid var(--gold);padding:0 12px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;position:sticky;top:54px;z-index:9998;}
.lang-bar-wrap::-webkit-scrollbar{display:none;}
.lang-btn{display:inline-block;padding:10px 14px;background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--fb);margin-bottom:-2px;}
.lang-btn:hover{color:#fff;}
.lang-btn.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600;}

/* MASTHEAD */
.masthead{background:linear-gradient(135deg,var(--gd),#2d6e42);padding:24px 20px;color:#fff;display:flex;align-items:center;gap:16px;}
.mh-icon{font-size:40px;flex-shrink:0;}
.mh-title{font-family:var(--fd);font-size:22px;line-height:1.2;margin-bottom:4px;}
.mh-sub{font-size:12px;opacity:.75;line-height:1.5;}
.mh-date{margin-left:auto;font-size:11px;opacity:.8;text-align:right;flex-shrink:0;}

/* ADMIN BAR */
.admin-bar{background:var(--gold-l);border-bottom:1px solid #f0d898;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ab-label{font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;}
.abtn{background:var(--wh);border:1px solid var(--bdr);border-radius:var(--rs);padding:6px 12px;font-family:var(--fb);font-size:12px;font-weight:500;color:var(--td);cursor:pointer;transition:all .15s;}
.abtn:hover{background:var(--gp);border-color:var(--gm);}
.abtn.pri{background:var(--gd);color:#fff;border-color:var(--gd);}
.abtn.pri:hover{background:var(--gm);}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;padding:14px 14px 0;background:var(--bg);position:sticky;top:88px;z-index:9997;}
.fbtn{background:var(--wh);border:1px solid var(--bdr);border-radius:20px;padding:5px 14px;font-family:var(--fb);font-size:12px;font-weight:500;cursor:pointer;color:var(--tm);transition:all .15s;}
.fbtn:hover{border-color:var(--gm);color:var(--gd);}
.fbtn.active{background:var(--gd);color:#fff;border-color:var(--gd);}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;}
.sec-hdr h2{font-family:var(--fd);font-size:18px;color:var(--gd);}
.sec-line{flex:1;height:1px;background:var(--bdr);}
.sec-cnt{background:var(--gp);color:var(--gd);font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;}

/* NEWS GRID */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:16px 16px 60px;}

/* NEWS CARD */
.news-card{background:var(--wh);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;height:100%;}
.news-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,92,46,.12);}
.card-img{height:180px;overflow:hidden;background:#e8f5ee;flex-shrink:0;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.card-img .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;}
.card-body{padding:14px;display:flex;flex-direction:column;flex:1;}
.card-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;margin-bottom:8px;}
.t-mp{background:#e8f5ee;color:#1a5c2e;}
.t-gs{background:#eaf4fb;color:#1a5f8a;}
.t-wa{background:#fffbeb;color:#d97706;}
.t-pd{background:#fdf0ee;color:#c0392b;}
.t-at{background:#f3e8ff;color:#7c3aed;}
.t-ex{background:#fff0e0;color:#9a5000;}
.card-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--td);line-height:1.35;margin-bottom:8px;}
.card-sum{font-size:12px;color:var(--tmut);line-height:1.55;margin-bottom:10px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bdr);margin-top:auto;}
.card-src{font-size:11px;color:var(--tmut);}
.read-btn{font-size:12px;font-weight:500;color:var(--gd);background:var(--gp);border:none;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:var(--fb);}
.read-btn:hover{background:#cce8d6;}

/* SKELETON */
.sk{background:#e0e8e0;border-radius:5px;animation:sk 1.2s ease-in-out infinite;}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.9}}
.sk-img{height:160px;width:100%;}
.sk-line{height:12px;margin:8px 0;border-radius:4px;}
.sk-w80{width:80%;}.sk-w60{width:60%;}.sk-w40{width:40%;}

/* DETAIL MODAL */
.nd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.nd-overlay.open{opacity:1;pointer-events:all;}
.nd-sheet{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .25s cubic-bezier(.22,1,.36,1);}
.nd-overlay.open .nd-sheet{transform:translateY(0);}
.nd-img{height:200px;position:relative;overflow:hidden;background:#e8f5ee;border-radius:20px 20px 0 0;}
.nd-img img{width:100%;height:100%;object-fit:cover;}
.nd-img .nd-fb{width:100%;height:100%;display:none;align-items:center;justify-content:center;font-size:64px;}
.nd-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 14px;}
.nd-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nd-badge{background:rgba(0,0,0,.4);color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;}
.nd-body{padding:18px 18px 30px;}
.nd-title{font-family:var(--fd);font-size:19px;color:var(--td);line-height:1.35;margin-bottom:12px;}
.nd-meta{display:flex;gap:10px;font-size:12px;color:var(--tmut);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bdr);}
.nd-sum{font-size:14px;color:var(--tm);line-height:1.8;margin-bottom:16px;}
.nd-ai-box{background:var(--gp);border:1px solid #b8dfc8;border-radius:var(--rs);padding:14px 16px;margin-bottom:16px;}
.nd-ai-lbl{font-size:10px;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.nd-ai-txt{font-size:13px;color:var(--tm);line-height:1.8;}
.nd-spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.nd-btns{display:flex;gap:10px;}
.nd-visit{flex:1;background:var(--gd);color:#fff;border:none;border-radius:var(--rs);padding:11px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;}
.nd-visit:hover{background:var(--gm);}
.nd-share{padding:11px 16px;background:var(--wh);border:1px solid var(--bdr);border-radius:var(--rs);font-family:var(--fb);font-size:13px;cursor:pointer;color:var(--td);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:20px;background:var(--gd);color:#fff;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:999;max-width:300px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.err{background:var(--red);}

/* RESPONSIVE */
@media(max-width:1100px){
  .news-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:800px){
  .news-grid{grid-template-columns:repeat(2,1fr);gap:14px;padding:12px 12px 40px;}
  .masthead{padding:18px 14px;}
  .mh-title{font-size:18px;}
}
@media(max-width:500px){
  .news-grid{grid-template-columns:1fr;gap:12px;padding:10px 10px 40px;}
  .masthead{flex-direction:column;align-items:flex-start;padding:14px 12px;}
  .mh-date{margin-left:0;margin-top:4px;}
  .mh-icon{font-size:28px;}
  .mh-title{font-size:16px;}
  .admin-bar{flex-direction:column;align-items:flex-start;gap:6px;}
  .topbar{padding:0 12px;}
  .tb-logo{font-size:14px;}
  .card-img{height:160px;}
  .card-title{font-size:13px;}
}
</style>
</head>

// ── UTILS ──
function fmtDate(loc){try{return new Date().toLocaleDateString(loc||'hi-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}catch(e){return new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
function saveKey(){try{localStorage.setItem('bh_key',document.getElementById('aiKey').value);}catch(e){}}
function loadKey(){try{const k=localStorage.getItem('bh_key');if(k&&document.getElementById('aiKey'))document.getElementById('aiKey').value=k;return k||'';}catch(e){return '';}}
function toggleAiPanel(){aiPanelOpen=!aiPanelOpen;document.getElementById('aiPanel').style.display=aiPanelOpen?'block':'none';}

// ── DAILY SEED (auto rotate) ──
function seed(lang){const d=new Date();return(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())+(lang||'hi').split('').reduce((a,c)=>a+c.charCodeAt(0),0)*7;}
function shuffle(arr,s){const a=[...arr];let x=s;for(let i=a.length-1;i>0;i--){x=(x*1664525+1013904223)&0xffffffff;const j=Math.abs(x)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function getTodaysNews(lang){
  // Use language pool, fill gaps from Hindi if needed
  const pool=(NEWS[lang]&&NEWS[lang].length>=6)?NEWS[lang]:NEWS.hi;
  const hiPool=NEWS.hi;
  const sh=shuffle(pool,seed(lang));
  const picked=[];
  // Try to get one from each category
  CATS.forEach(cat=>{
    const f=sh.find(n=>n.cat===cat&&!picked.includes(n));
    if(f)picked.push(f);
    else{
      // fallback to Hindi for missing category
      const hf=hiPool.find(n=>n.cat===cat&&!picked.some(p=>p.t===n.t));
      if(hf)picked.push({...hf});
    }
  });
  // Fill remaining slots up to 10
  sh.forEach(n=>{if(picked.length<10&&!picked.includes(n))picked.push(n);});
  if(picked.length<10){
    shuffle(hiPool,seed(lang)+1).forEach(n=>{
      if(picked.length<10&&!picked.some(p=>p.t===n.t))picked.push({...n});
    });
  }
  return picked.slice(0,10).map((n,i)=>({...n,id:i+1,img:CAT_IMG[n.cat]||CAT_IMG['Market Price'],fb:CAT_FB[n.cat]||'📰',bg:CAT_BG[n.cat]||'#e8f5ee'}));
}

}

function setFilter(cat,btn){

  document.getElementById('filterBar').innerHTML=cats.map((c,i)=>`<button class="fbtn${curFilter===c?' active':''}" onclick="setFilter('${c}',this)">${t.fil[i]||c}</button>`).join('');

// ── RENDER NEWS ──
function renderNews(){
  const t=UI[curLang]||UI.hi;
  const grid=document.getElementById('newsGrid');
  const list=curFilter==='all'?curNews:curNews.filter(n=>n.cat===curFilter);
  document.getElementById('secCnt').textContent=list.length+' '+(t.fil[0]||'खबरें');
  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6b7a70;font-size:14px;">इस category में खबरें नहीं हैं।</div>';return;}
  grid.innerHTML=list.map(n=>{
    const hasImg=n.img&&n.img.length>10&&n.img.startsWith('http');
    const fallbackImg=CAT_IMG[n.cat]||CAT_IMG['Market Price'];
    // English tab par Hindi summary hide karo
    const hindiRe=/[\u0900-\u097F]/;
    const summary=n.s||'';
    const isHindiSummary=hindiRe.test(summary);
    const displaySummary=(curLang==='en'&&isHindiSummary)?'Click to read full article...':summary;
    return `
    <div class="news-card" onclick="openDetail(${n.id})">
      <div class="card-img" style="height:180px;overflow:hidden;background:#e0e0e0;">
        ${hasImg
          ? `<img src="${n.img}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='${fallbackImg}';this.onerror=null;"/>`
          : `<img src="${fallbackImg}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
             <div class="fallback" style="display:none;background:${n.bg};width:100%;height:100%;align-items:center;justify-content:center;font-size:48px;">${n.fb}</div>`
        }
      </div>
      <div class="card-body">
        <span class="card-tag ${CAT_TAG[n.cat]||'t-mp'}">${n.cat}</span>
        <div class="card-title">${n.t}</div>
        <div class="card-sum">${displaySummary.substring(0,120)}${displaySummary.length>120?'...':''}</div>
        <div class="card-footer">
          <span class="card-src">📰 ${n.src}</span>
          <button class="read-btn" onclick="event.stopPropagation();openDetail(${n.id})">${t.read||'पूरी खबर'} ›</button>
        </div>
      </div>
    </div>`}).join('');
}

// ── SWITCH LANGUAGE ──
async function switchLang(code){
  curLang=code;
  curFilter='all';
  const t=UI[code]||UI.hi;
  document.getElementById('mhSub').textContent=t.sub;
  document.getElementById('secTitle').textContent=t.sec;
  document.getElementById('mhDate').textContent=fmtDate(t.loc);
  document.getElementById('refreshLbl').textContent=t.ref;
  buildLangBar();
  buildFilters();
  const grid=document.getElementById('newsGrid');
  grid.innerHTML=Array(6).fill(0).map(()=>`<div class="news-card"><div class="card-img sk sk-img"></div><div class="card-body"><div class="sk sk-line sk-w80"></div><div class="sk sk-line sk-w60"></div><div class="sk sk-line sk-w40"></div></div></div>`).join('');
  const lname=LANGS.find(l=>l.code===code)?.label||code;

  // Hindi — Hindi live articles dikhao
  if(code==='hi'){
    setTimeout(()=>{
      if(liveArticles.length>0){
        curNews=liveArticles.map((a,i)=>({...a,id:i+1}));
      } else {
        curNews=getTodaysNews('hi');
      }
      renderNews();
      toast('✅ हिंदी में खबरें लोड हुईं!');
    },300);
    return;
  }

  // English — SIRF English articles dikhao (alag en_articles se)
  if(code==='en'){
    setTimeout(()=>{
      if(liveArticlesEn.length>0){
        // English articles seedha load karo — no Hindi mixing!
        curNews=liveArticlesEn.map((a,i)=>({...a,id:i+1}));
        document.getElementById('secTitle').textContent="Today's Agriculture News";
      } else if(liveArticles.length>0){
        // Fallback — filter Hindi chars
        const hindiRe=/[ऀ-ॿ]/;
        const enOnly=liveArticles.filter(a=>!hindiRe.test(a.t||'')&&!hindiRe.test(a.s||''));
        curNews=(enOnly.length>=3?enOnly:liveArticles).map((a,i)=>({...a,id:i+1}));
      } else {
        curNews=getTodaysNews('en');
      }
      renderNews();
      toast('✅ English news loaded!');
    },300);
    return;
  }

  // Dusri languages ke liye — Claude AI se translate karo
  const apiKey=loadKey().trim();
  if(apiKey && apiKey.startsWith('sk-ant') && liveArticles.length>0){
    toast('🌐 '+lname+' mein translate ho raha hai...');
    try{
      const langNames={pa:'Punjabi',mr:'Marathi',gu:'Gujarati',ta:'Tamil',te:'Telugu',kn:'Kannada',ml:'Malayalam',bn:'Bengali',or:'Odia',as:'Assamese',ur:'Urdu',raj:'Rajasthani'};
      const articles=liveArticles.slice(0,10);
      const titlesForTranslation=articles.map((a,i)=>`${i+1}. ${a.title}`).join('\n');
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:2000,
          messages:[{role:'user',content:`Translate these agriculture news headlines to ${langNames[code]||code} language. Keep numbers, names and places same. Return ONLY numbered translations, nothing else:\n\n${titlesForTranslation}`}]
        })
      });
      const data=await resp.json();
      if(!data.error){
        const translated=data.content.map(b=>b.text||'').join('').trim().split('\n').filter(l=>l.trim());
        curNews=articles.map((a,i)=>{
          const tLine=translated.find(l=>l.startsWith((i+1)+'.'));
          const tTitle=tLine?tLine.replace(/^\d+\.\s*/,'').trim():a.title;
          return {...a,id:i+1,t:tTitle,s:a.description||a.s||''};
        });
        renderNews();
        toast('✅ '+lname+' mein translate hua!');
        return;
      }
    }catch(e){console.log('Translation error:',e);}
  }

  // Fallback — static data
  setTimeout(()=>{
    curNews=getTodaysNews(code);
    renderNews();
    toast('✅ '+lname+' mein update hua!');
  },300);
}

  document.getElementById('ndTitle').textContent=n.t;
  document.getElementById('ndSrc').textContent='📰 '+n.src;
  document.getElementById('ndDate').textContent='📅 '+fmtDate((UI[curLang]||UI.hi).loc);

  document.getElementById('ndVisitLbl').textContent=t.visit||'स्रोत देखें';
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  // Generate AI detail
  genAiDetail(n,curLang);
}

async function genAiDetail(n,lang){
  const aiTxt=document.getElementById('ndAiTxt');
  const apiKey=loadKey().trim();
  const langNames={hi:'Hindi',en:'English',pa:'Punjabi',mr:'Marathi',gu:'Gujarati',ta:'Tamil',te:'Telugu',kn:'Kannada',ml:'Malayalam',bn:'Bengali',or:'Odia',as:'Assamese',ur:'Urdu',raj:'Rajasthani'};

  // Without API — smart fallback in chosen language
  if(!apiKey||!apiKey.startsWith('sk-ant')){
    await new Promise(r=>setTimeout(r,400));
    const fallback={
      hi:`${n.src} के अनुसार, ${n.s} किसानों को इस जानकारी का उपयोग अपनी खेती की योजना में करना चाहिए। अधिक जानकारी के लिए नीचे स्रोत बटन पर click करें।`,
      en:`According to ${n.src}, ${n.s} Farmers should use this information for planning their agricultural activities. Click the source button below for more details.`,
      pa:`${n.src} ਮੁਤਾਬਕ, ${n.s} ਕਿਸਾਨਾਂ ਨੂੰ ਇਸ ਜਾਣਕਾਰੀ ਦੀ ਵਰਤੋਂ ਕਰਨੀ ਚਾਹੀਦੀ ਹੈ।`,
      mr:`${n.src} नुसार, ${n.s} शेतकऱ्यांनी ही माहिती वापरावी.`,
      gu:`${n.src} અનુસાર, ${n.s} ખેડૂતો આ માહિતીનો ઉપયોગ કરે.`,
      ta:`${n.src} படி, ${n.s} விவசாயிகள் இதை பயன்படுத்துங்கள்.`,
      te:`${n.src} ప్రకారం, ${n.s} రైతులు ఈ సమాచారాన్ని ఉపయోగించుకోండి.`,
      kn:`${n.src} ಪ್ರಕಾರ, ${n.s} ರೈತರು ಈ ಮಾಹಿತಿ ಬಳಸಿ.`,
      ml:`${n.src} അനുസരിച്ച്, ${n.s} കർഷകർ ഈ വിവരം ഉപയോഗിക്കണം.`,
      bn:`${n.src} অনুসারে, ${n.s} কৃষকরা এই তথ্য ব্যবহার করুন।`,
      or:`${n.src} ଅନୁଯାୟୀ, ${n.s}`,
      as:`${n.src} অনুযায়ী, ${n.s}`,
      ur:`${n.src} کے مطابق، ${n.s} کسان اس معلومات سے فائدہ اٹھائیں۔`,
      raj:`${n.src} रे अनुसार, ${n.s} किसानां नें यो जानकारी काम लेणी चाईजे।`,
    };
    aiTxt.textContent=fallback[lang]||fallback.hi;
    return;
  }

  // With API key — real Claude AI
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:`Write a 3-4 sentence detailed explanation in ${langNames[lang]||'Hindi'} language about this agriculture news for Indian farmers:\n\nHeadline: "${n.t}"\nSummary: "${n.s}"\nSource: ${n.src}\n\nInclude practical advice and key numbers. Write ONLY the explanation, nothing else.`}]})
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    aiTxt.textContent=data.content.map(b=>b.text||'').join('').trim();
  }catch(err){
    aiTxt.textContent=(UI[lang]||UI.hi).ai+': '+n.s;
  }
}

function closeDetail(){document.getElementById('ndOverlay').classList.remove('open');document.body.style.overflow='';}

function visitSource(){
  if(!curDetail||!curDetail.url||curDetail.url==='#') return;
  var url = curDetail.url;
  // Hindi aur English mein seedha article kholo
  if(curLang==='hi'||curLang==='en'){
    window.open(url,'_blank');
    return;
  }
  // Dusri languages ke liye Google Translate se kholo
  var langMap={
    pa:'pa',mr:'mr',gu:'gu',ta:'ta',te:'te',
    kn:'kn',ml:'ml',bn:'bn',or:'or',as:'as',
    ur:'ur',raj:'hi'
  };
  var tLang = langMap[curLang] || 'hi';
  var translateUrl = 'https://translate.google.com/translate?sl=auto&tl='+tLang+'&u='+encodeURIComponent(url);
  window.open(translateUrl,'_blank');
}
function shareItem(){
  if(!curDetail)return;
  const txt=curDetail.t+'\n'+curDetail.s+'\n\nSource: '+curDetail.src;
  if(navigator.share)navigator.share({title:curDetail.t,text:txt,url:curDetail.url});
  else if(navigator.clipboard){navigator.clipboard.writeText(txt);toast('📋 Copied!');}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

async function loadLiveNews(){
  const grid=document.getElementById('newsGrid');
  grid.innerHTML=Array(6).fill(0).map(()=>`<div class="news-card"><div class="card-img sk sk-img"></div><div class="card-body"><div class="sk sk-line sk-w80"></div><div class="sk sk-line sk-w60"></div><div class="sk sk-line sk-w40"></div></div></div>`).join('');
  try{
    const res=await fetch('news.json?t='+Date.now());
    if(!res.ok) throw new Error('not found');
    const data=await res.json();
    if(!data.articles||data.articles.length===0) throw new Error('empty');

    // Article map function
    function mapArt(arr){
      return (arr||[]).map((a,i)=>({
        id:i+1,
        t:a.title||'',
        s:a.description||'',
        img:a.image||'',
        url:a.url||'#',
        src:a.source||'News',
        lang:a.lang||'hi',
        cat:detectCat(a.title),
        fb:CAT_FB[detectCat(a.title)]||'📰',
        bg:CAT_BG[detectCat(a.title)]||'#e8f5ee',
        pubDate:a.pubDate||'',
      }));
    }

    // Hindi articles store karo
    var hiRaw = data.hi_articles || data.articles || [];
    liveArticles = mapArt(hiRaw);

    // English articles store karo — en_articles ya filter se
    var enRaw = data.en_articles || [];
    if(enRaw.length > 0){
      liveArticlesEn = mapArt(enRaw);
    } else {
      // Fallback: Hindi chars filter out karo
      const hRe = /[ऀ-ॿ]/;
      liveArticlesEn = mapArt((data.articles||[]).filter(a=>!hRe.test(a.title||'')));
    }

    curNews=[...liveArticles];
    document.getElementById('secCnt').textContent=curNews.length+' खबरें';

    if(data.updated){
      try{
        const upd=new Date(data.updated);
        document.getElementById('mhDate').textContent='अंतिम अपडेट: '+upd.toLocaleString('hi-IN');
      }catch(e){}
    }
    renderNews();
    toast('✅ आज की '+curNews.length+' ताज़ा खबरें लोड हुईं!');
  }catch(err){
    console.warn('news.json not found, using static data');
    curNews=getTodaysNews(curLang);
    renderNews();
  }
}

// ── DETECT CATEGORY ──
function detectCat(title){
  const t=(title||'').toLowerCase();
  if(/msp|mandi|bhav|price|दाम|मंडी|भाव|quintal|क्विंटल|market|बाज़ार|rate|crop price/.test(t)) return 'Market Price';
  if(/yojana|scheme|subsidy|pm-kisan|pm kisan|सब्सिडी|योजना|सरकार|government|nabard|kcc/.test(t)) return 'Government Scheme';
  if(/monsoon|rain|weather|मानसून|बारिश|drought|flood|heatwave|imd|तूफान|cyclone/.test(t)) return 'Weather Alert';
  if(/pest|disease|locust|टिड्डी|कीट|रोग|fungus|blight|rust|worm/.test(t)) return 'Pest & Disease';
  if(/drone|ai |tech|technology|digital|nano|app|satellite|sensor/.test(t)) return 'AgriTech';
  if(/export|import|निर्यात|apeda|trade|global/.test(t)) return 'Export';
  return 'Market Price';
}

// ── AUTO DAILY REFRESH (every hour) ──
setInterval(()=>{
  const today=new Date().toDateString();
  const last=localStorage.getItem('bh_date_'+curLang);
  if(last!==today){localStorage.setItem('bh_date_'+curLang,today);loadLiveNews();toast('🌅 नया दिन — खबरें auto-update हुईं!');}
},3600000);

  loadKey();
  buildLangBar();
  curLang='hi';
  curFilter='all';
  buildFilters();
  loadLiveNews(); // Live news load karo

});
